name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite:///./ship_db.db
          SECRET_KEY: shipyard-ci-secret
          ACCESS_TOKEN_EXPIRE_MINUTES: '60'
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: shipyard-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: false
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: shipyard-frontend:ci

      - name: Validate Docker Compose configuration
        run: docker compose config

  e2e-smoke:
    name: End-to-end smoke tests
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - docker-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start application stack
        run: docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Wait for frontend availability
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
        run: npm run test:e2e

      - name: Upload Playwright report artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report

      - name: Stop application stack
        if: always()
        run: docker compose down -v
