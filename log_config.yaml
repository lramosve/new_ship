
version: 1
formatters:
  default:
    '()': 'uvicorn.logging.DefaultFormatter'
    format: '%(levelprefix)s %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
handlers:
  file:
    class: logging.FileHandler
    filename: uvicorn.log
    formatter: default
loggers:
  uvicorn.error:
    level: DEBUG
    handlers: ["file"]
    propagate: no
  uvicorn.access:
    level: DEBUG
    handlers: ["file"]
    propagate: no
